<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhDbuddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── Design Tokens ─── */
    :root {
      --header-height: 72px;
      --sage:       #7A9E7E;
      --sage-light: #B8C7A8;
      --sage-pale:  #E8EFE4;
      --cream:      #FAF8F4;
      --terra:      #C0705A;
      --terra-dark: #9B4F39;
      --brown:      #3B2F2A;
      --brown-soft: #6B5347;
      --white:      #FFFFFF;
      --ink:        #2A2118;
      --muted:      #8C7B72;
      --border:     rgba(59,47,42,.1);
      --shadow-sm:  0 2px 12px rgba(59,47,42,.08);
      --shadow-lg:  0 24px 64px rgba(59,47,42,.14);
      --radius-sm:  8px;
      --radius-md:  16px;
      --radius-lg:  28px;
      --font-display: 'Lora', Georgia, serif;
      --font-body:    'Source Sans 3', sans-serif;
      --ease-out: cubic-bezier(.22,1,.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background-color: var(--cream);
      color: var(--brown);
      padding-top: var(--header-height);
      -webkit-font-smoothing: antialiased;
    }
    section { scroll-margin-top: var(--header-height); }
    a { color: inherit; }

    /* ─── Header ─── */
    .main-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(250,248,244,.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 1000;
      transition: box-shadow .3s;
    }
    .main-header.scrolled { box-shadow: var(--shadow-sm); }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo { width: 36px; height: auto; }
    .site-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -.01em;
    }
    .site-title em { color: var(--terra); font-style: italic; font-weight: 400; }

    /* Desktop nav */
    .nav-bar { display: flex; gap: 4px; align-items: center; }
    .nav-link {
      text-decoration: none;
      color: var(--brown-soft);
      font-size: .875rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 999px;
      transition: background .22s, color .22s;
      white-space: nowrap;
    }
    .nav-link:hover { background: var(--sage-pale); color: var(--brown); }
    .nav-link.active { background: var(--sage); color: var(--white); }

    /* Hamburger button */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 38px;
      height: 38px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: background .2s;
    }
    .hamburger:hover { background: var(--sage-pale); }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--brown);
      border-radius: 2px;
      transition: transform .28s var(--ease-out), opacity .2s;
      transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile nav drawer */
    .mobile-nav {
      position: fixed;
      top: var(--header-height);
      left: 0; right: 0;
      background: rgba(250,248,244,.98);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      flex-direction: column;
      padding: 12px 20px 20px;
      gap: 4px;
      z-index: 998;
      box-shadow: var(--shadow-sm);
      display: none;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity .25s var(--ease-out), transform .25s var(--ease-out);
    }
    .mobile-nav.open {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }
    .mobile-nav .nav-link {
      font-size: 1rem;
      padding: 13px 16px;
      border-radius: var(--radius-sm);
      width: 100%;
    }

    /* ─── Home Section ─── */
    .home-section {
      background: linear-gradient(160deg, var(--sage-light) 0%, #cad8bc 100%);
      min-height: calc(100vh - var(--header-height));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      position: relative;
      overflow: hidden;
    }
    .home-section::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,.22) 0%, transparent 70%);
      top: -150px; right: -150px;
      border-radius: 50%;
      pointer-events: none;
    }
    .home-section::after {
      content: '';
      position: absolute;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(192,112,90,.1) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      border-radius: 50%;
      pointer-events: none;
    }
    .home-text {
      max-width: 760px;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeUp .9s var(--ease-out) both;
    }

    .home-eyebrow {
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--brown-soft);
      margin-bottom: 16px;
    }

    .home-text h1 {
      font-family: var(--font-display);
      font-size: clamp(1.85rem, 4.5vw, 3.4rem);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.2;
      letter-spacing: -.01em;
      margin-bottom: 20px;
    }

    .home-lead {
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--brown);
      max-width: 560px;
      margin: 0 auto 44px;
    }

    /* Two-column info cards */
    .home-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 600px;
      margin: 0 auto 44px;
      text-align: left;
    }
    .home-card {
      background: rgba(255,255,255,.72);
      border: 0.5px solid rgba(59,47,42,.12);
      border-radius: var(--radius-md);
      padding: 20px 18px;
    }
    .home-card-title {
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 12px;
    }
    .home-card ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    /* Numbered list items (How it works) */
    .home-card ul.numbered li {
      font-size: .84rem;
      color: var(--brown-soft);
      padding-left: 22px;
      position: relative;
      line-height: 1.5;
    }
    .home-card ul.numbered li .step-num {
      position: absolute;
      left: 0;
      top: 2px;
      font-size: .625rem;
      font-weight: 500;
      color: var(--terra);
      background: rgba(192,112,90,.12);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Bullet list items (What we offer) */
    .home-card ul.dotted li {
      font-size: .84rem;
      color: var(--brown-soft);
      padding-left: 14px;
      position: relative;
      line-height: 1.5;
    }
    .home-card ul.dotted li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 7px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sage);
    }

    /* Final quote line */
    .home-text .final-line {
      display: inline-block;
      position: relative;
      padding: 20px 0;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.7;
      letter-spacing: -.01em;
      margin-bottom: 0;
    }
    .home-text .final-line::before,
    .home-text .final-line::after {
      content: '';
      display: block;
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(59,47,42,.35), transparent);
      margin: 0 auto;
      border-radius: 2px;
    }
    .home-text .final-line::before { margin-bottom: 18px; }
    .home-text .final-line::after  { margin-top: 18px; }

    /* ─── Why Join Section ─── */
    .why-join-section {
      background: var(--cream);
      padding: 48px 40px 40px;
      height: calc(100vh - var(--header-height));
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .why-join-section h2 {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 600;
      text-align: center;
      color: var(--ink);
      margin-bottom: 28px;
      letter-spacing: -.02em;
    }
    .why-join-section h2 em { color: var(--terra); font-style: italic; }

    .buddy-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1040px;
      width: 100%;
      margin: 0 auto 24px;
    }
    .buddy-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px 24px 20px;
      box-shadow: var(--shadow-sm);
      transition: transform .3s var(--ease-out), box-shadow .3s var(--ease-out);
      position: relative;
      overflow: hidden;
    }
    .buddy-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--sage), var(--terra));
      opacity: 0;
      transition: opacity .3s;
    }
    .buddy-box:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .buddy-box:hover::before { opacity: 1; }
    .buddy-icon { display: block; width: 36px; margin: 0 auto 12px; }
    .buddy-box h3 {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 10px;
      text-align: center;
    }
    .buddy-box p {
      font-size: .875rem;
      line-height: 1.65;
      color: var(--brown-soft);
      margin-bottom: 8px;
    }
    .buddy-box ul {
      margin-top: 4px;
      padding-left: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .buddy-box ul li {
      font-size: .84rem;
      line-height: 1.5;
      color: var(--brown-soft);
      padding-left: 18px;
      position: relative;
    }
    .buddy-box ul li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 9px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage), var(--terra));
      flex-shrink: 0;
    }
    .why-join-section .final-line {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      font-size: .9rem;
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ─── What to Expect Section ─── */
    .how-it-works-section {
      background: var(--sage-pale);
      padding: 56px 40px;
      height: calc(100vh - var(--header-height));
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .how-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 72px;
      max-width: 1040px;
      width: 100%;
      margin: 0 auto;
      align-items: center;
      flex: 1;
    }
    .how-text h3 {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 20px;
      letter-spacing: -.02em;
    }
    .how-text p {
      font-size: .9rem;
      line-height: 1.7;
      color: var(--brown-soft);
      margin-bottom: 8px;
      padding-left: 16px;
      border-left: 2px solid transparent;
      transition: border-color .2s, color .2s;
    }
    .how-text p:hover { border-left-color: var(--terra); color: var(--brown); }
    .how-image { display: flex; justify-content: center; align-items: center; }
    .how-image img {
      max-width: 100%;
      max-height: 420px;
      object-fit: contain;
      border-radius: var(--radius-lg);
      filter: drop-shadow(0 12px 32px rgba(59,47,42,.12));
    }
    .signup-text {
      text-align: center;
      padding-top: 32px;
      max-width: 1040px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }
    .signup-text p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--brown-soft);
      margin-bottom: 20px;
    }
    .signup-link {
      display: inline-block;
      background: var(--terra);
      color: var(--white);
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 999px;
      font-weight: 500;
      font-size: .95rem;
      letter-spacing: .02em;
      transition: background .25s, transform .25s var(--ease-out), box-shadow .25s;
      box-shadow: 0 4px 18px rgba(192,112,90,.32);
    }
    .signup-link:hover {
      background: var(--terra-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(192,112,90,.42);
    }

       <!-- About Us Section -->
    <section id="about-us" class="about-us-page">
      <div class="about-content">
        <h2 class="reveal">About Us</h2>
        <p class="section-label reveal">Organizing Team &amp; Post-Graduate Buddies</p>

          <div class="portrait-card reveal">
            <div class="portrait-img-wrapper">

              <a href="https://www.linkedin.com/in/jona-rada-399b042a3/" target="_blank" class="portrait-social">

              <img src="alina.jpg" alt="Alina" class="portrait-img" />

          <div class="portrait-card reveal">
            <div class="portrait-img-wrapper">
              <img src="nadine.jpg" alt="Nadine" class="portrait-img" />

        <!-- Row 2: Olivia, Laura, Nzumbi (Kevin) -->
        <div class="portrait-grid-last-row">
 
          <div class="portrait-card reveal">
            <div class="portrait-img-wrapper">
              <img src="Olivia.jpg" alt="Olivia" class="portrait-img" />
              <a href="https://www.linkedin.com/in/olivia-pfeil-gardiner-065218270/" target="_blank" class="portrait-social">

      </div>
    </section>
 
  </main>
 
  <script>
    /* ── Header shadow on scroll ── */
    const header = document.getElementById('mainHeader');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
 
    /* ── Hamburger / mobile nav toggle ── */
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');
 
    hamburger.addEventListener('click', () => {
      const isOpen = !mobileNav.classList.contains('open');
      hamburger.classList.toggle('open', isOpen);
      hamburger.setAttribute('aria-expanded', isOpen);
      mobileNav.setAttribute('aria-hidden', !isOpen);
      if (isOpen) {
        mobileNav.style.display = 'flex';
        mobileNav.getBoundingClientRect();
        mobileNav.classList.add('open');
      } else {
        mobileNav.classList.remove('open');
      }
    });
 
    /* Close mobile nav when a link is tapped */
    mobileNav.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        mobileNav.classList.remove('open');
        mobileNav.setAttribute('aria-hidden', 'true');
      });
    });
 
    /* ── Nav highlight on scroll ── */
    const sections    = document.querySelectorAll('main section');
    const allNavLinks = document.querySelectorAll('.nav-link');
 
    function highlightNav() {
      let current = '';
      sections.forEach(s => {
        if (window.scrollY >= s.offsetTop - (window.innerHeight * 0.5)) current = s.id;
      });
      allNavLinks.forEach(l => {
        l.classList.toggle('active', l.getAttribute('href').includes(current));
      });
    }
    window.addEventListener('scroll', highlightNav, { passive: true });
    highlightNav();
 
    /* ── Smooth scroll ── */
    allNavLinks.forEach(link => {
      link.addEventListener('click', e => {
        const target = document.querySelector(link.getAttribute('href'));
        if (target) {
          e.preventDefault();
          window.scrollTo({ top: target.offsetTop - 72, behavior: 'smooth' });
        }
      });
    });
 
    /* ── Scroll reveal ── */
    const reveals = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          entry.target.style.transitionDelay = (i * 0.07) + 's';
          entry.target.classList.add('visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    reveals.forEach(el => io.observe(el));
  </script>
 
  <!-- Floating Sign-Up Bar -->
  <div class="floating-cta">
    <p>Want to join? Share a few details about yourself so we can match you with the right buddy. It's completely free!</p>
    <a href="signup.html" class="floating-cta-btn">Sign Up Here</a>
  </div>
